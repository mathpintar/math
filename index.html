<!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref as dbRef, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCWsd4hqL5kPgzh-pjwcBhzVLXyTGJU_Xw",
            authDomain: "mathpintar-61339.firebaseapp.com",
            databaseURL: "https://mathpintar-61339-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mathpintar-61339",
            storageBucket: "mathpintar-61339.firebasestorage.app",
            messagingSenderId: "360973475425",
            appId: "1:360973475425:web:63da6361e7cac39b99d420"
        };

        // Initialize Firebase
        const fApp = initializeApp(firebaseConfig);
        const fAuth = getAuth(fApp);
        const fDatabase = getDatabase(fApp);

        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const user = ref(null);               
                const parentUser = ref(null);         
                const screen = ref('login-selection');
                
                const childPinInput = ref('');
                const parentEmail = ref('');
                const parentPassword = ref('');
                const isRegisterMode = ref(false);
                const authLoading = ref(false);
                const newChildName = ref('');

                const childProfiles = ref([]);
                const reportList = ref([]);

                const config = ref({
                    operation: 'Tambah',
                    totalQuestions: 10,
                    difficulty: 'Mudah'
                });

                const questions = ref([]);
                const currentQuestionIndex = ref(0);
                const score = ref(0);
                const usedQuestionCombos = ref(new Set());
                const correctionIndex = ref(null);

                const answerArray = ref([]); 
                const carryArray = ref([]);  
                const borrowArray = ref([]); 
                
                const divisionInputs = ref({
                    quotientArray: [],
                    remainderArray: [],
                    finalRemainder: ''
                });

                const activeTarget = ref({ type: 'answer', index: 0 });
                const timerSeconds = ref(0);
                const timerInterval = ref(null);
                const finalTimeDisplay = ref('');

                const playSound = (type) => {
                    try {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        if (!AudioContext) return;
                        const ctx = new AudioContext();
                        
                        if (type === 'click') {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(400, ctx.currentTime);
                            osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.1);
                            gain.gain.setValueAtTime(0.3, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start();
                            osc.stop(ctx.currentTime + 0.1);
                        } 
                        else if (type === 'correct') {
                            const now = ctx.currentTime;
                            [600, 900].forEach((freq, i) => {
                                const osc = ctx.createOscillator();
                                const gain = ctx.createGain();
                                osc.type = 'triangle';
                                osc.frequency.setValueAtTime(freq, now + i * 0.08);
                                gain.gain.setValueAtTime(0.2, now + i * 0.08);
                                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.3);
                                osc.connect(gain);
                                gain.connect(ctx.destination);
                                osc.start(now + i * 0.08);
                                osc.stop(now + i * 0.08 + 0.3);
                            });
                        } 
                        else if (type === 'wrong') {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.type = 'sawtooth';
                            osc.frequency.setValueAtTime(150, ctx.currentTime);
                            osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.3);
                            gain.gain.setValueAtTime(0.2, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start();
                            osc.stop(ctx.currentTime + 0.3);
                        }
                    } catch (e) {}
                };

                onMounted(() => {
                    onAuthStateChanged(fAuth, (firebaseUser) => {
                        if (firebaseUser) {
                            // HANYA setkan parentUser dan tukar skrin jika BUKAN dalam mode akaun anak
                            if (!user.value) {
                                parentUser.value = firebaseUser.uid;
                                syncParentDatabaseBranches(firebaseUser.uid);
                                screen.value = 'parentDashboard';
                            }
                        } else {
                            // Jika tiada sesi login langsung, pastikan semuanya kosong kecuali jika anak sedang aktif bermain
                            if (!user.value) {
                                parentUser.value = null;
                                screen.value = 'login-selection';
                            }
                        }
                    });
                });

                const syncParentDatabaseBranches = (uid) => {
                    const profilesRef = dbRef(fDatabase, `users/${uid}/profiles`);
                    onValue(profilesRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            childProfiles.value = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                        } else {
                            childProfiles.value = [];
                        }
                    });

                    const reportsRef = dbRef(fDatabase, `users/${uid}/reports`);
                    onValue(reportsRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            reportList.value = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                        } else {
                            reportList.value = [];
                        }
                    });
                };

                const handleParentAuth = async () => {
                    if (!parentEmail.value || !parentPassword.value) return;
                    authLoading.value = true;
                    try {
                        if (isRegisterMode.value) {
                            await createUserWithEmailAndPassword(fAuth, parentEmail.value, parentPassword.value);
                            alert("Akaun berjaya didaftarkan!");
                        } else {
                            await signInWithEmailAndPassword(fAuth, parentEmail.value, parentPassword.value);
                        }
                        user.value = null; // Pastikan mod anak dikosongkan jika ibu bapa masuk
                    } catch (error) {
                        alert("Ralat Pengesahan: " + error.message);
                        playSound('wrong');
                    } finally {
                        authLoading.value = false;
                    }
                };

                const loginAsChild = async () => {
                    if (childPinInput.value.trim().length !== 4) return;
                    authLoading.value = true;
                    try {
                        const globalUsersRef = dbRef(fDatabase, 'users');
                        const snapshot = await get(globalUsersRef);
                        let pinFound = false;

                        if (snapshot.exists()) {
                            const allUsers = snapshot.val();
                            for (const parentUid in allUsers) {
                                const profiles = allUsers[parentUid].profiles;
                                if (profiles) {
                                    for (const profileId in profiles) {
                                        if (String(profiles[profileId].pin) === childPinInput.value.trim()) {
                                            // PENTING: Untuk akaun anak, kosongkan parentUser supaya butang "Urus" disembunyikan
                                            parentUser.value = null; 
                                            user.value = profiles[profileId].name;
                                            
                                            // Sinkronkan data laporan milik id parent ini sahaja secara senyap (tanpa buka dashboard parent)
                                            const reportsRef = dbRef(fDatabase, `users/${parentUid}/reports`);
                                            onValue(reportsRef, (repSnapshot) => {
                                                const repData = repSnapshot.val();
                                                if (repData) {
                                                    reportList.value = Object.keys(repData).map(key => ({ id: key, ...repData[key] }));
                                                } else {
                                                    reportList.value = [];
                                                }
                                            });

                                            // Simpan ID parent secara sementara di memori tersembunyi untuk hantar skor nanti
                                            config.value.activeParentId = parentUid;

                                            playSound('correct');
                                            screen.value = 'menu';
                                            pinFound = true;
                                            break;
                                        }
                                    }
                                }
                                if (pinFound) break;
                            }
                        }

                        if (!pinFound) {
                            alert("No PIN tidak sah. Sila semak dengan ibu bapa anda.");
                            playSound('wrong');
                        }
                    } catch (e) {
                        alert("Ralat sambungan: " + e.message);
                    } finally {
                        authLoading.value = false;
                    }
                };

                const addChildProfile = async () => {
                    if (!newChildName.value.trim() || !parentUser.value) return;
                    try {
                        const pin = Math.floor(1000 + Math.random() * 9000); 
                        const profilesRef = dbRef(fDatabase, `users/${parentUser.value}/profiles`);
                        const newProfile = {
                            name: newChildName.value.trim().toLowerCase(),
                            pin: pin
                        };
                        await push(profilesRef, newProfile);
                        newChildName.value = '';
                        playSound('correct');
                    } catch (e) {
                        alert("Gagal menambah profil: " + e.message);
                    }
                };

                const regenerateChildPin = async (profileId) => {
                    if (!parentUser.value) return;
                    try {
                        const newPin = Math.floor(1000 + Math.random() * 9000);
                        await set(dbRef(fDatabase, `users/${parentUser.value}/profiles/${profileId}/pin`), newPin);
                        playSound('correct');
                    } catch (e) {
                        alert("Gagal menukar PIN: " + e.message);
                    }
                };

                const deleteChildProfile = async (profileId) => {
                    if (!parentUser.value || !confirm("Padam profil anak ini secara kekal?")) return;
                    try {
                        await remove(dbRef(fDatabase, `users/${parentUser.value}/profiles/${profileId}`));
                        playSound('wrong');
                    } catch (e) {
                        alert("Gagal memadam: " + e.message);
                    }
                };

                const getChildStats = (name) => {
                    const childReports = reportList.value.filter(r => r.studentName === name.toLowerCase());
                    if (childReports.length === 0) return { total: 0, accuracy: 0 };
                    const total = childReports.length;
                    const avgAcc = Math.round(childReports.reduce((s, r) => s + (r.accuracy || 0), 0) / total);
                    return { total, accuracy: avgAcc };
                };

                const openParentDashboard = () => {
                    if(!parentUser.value) return; // Sekatan tambahan sekiranya diceroboh
                    playSound('click');
                    screen.value = 'parentDashboard';
                };

                const logout = async () => {
                    playSound('wrong');
                    stopTimer();
                    await signOut(fAuth);
                    user.value = null;
                    parentUser.value = null;
                    childProfiles.value = [];
                    reportList.value = [];
                    childPinInput.value = '';
                    parentEmail.value = '';
                    parentPassword.value = '';
                    screen.value = 'login-selection';
                };

                const filteredReportList = computed(() => {
                    if (!user.value) return reportList.value; 
                    return reportList.value.filter(r => r.studentName === user.value.toLowerCase());
                });

                const currentQuestion = computed(() => {
                    if (screen.value === 'correction' && correctionIndex.value !== null) {
                        return questions.value[correctionIndex.value] || { num1: 0, num2: 0 };
                    }
                    return questions.value[currentQuestionIndex.value] || { num1: 0, num2: 0 };
                });

                const maxColumns = computed(() => {
                    const len1 = String(currentQuestion.value.num1).length;
                    const len2 = String(currentQuestion.value.num2).length;
                    return Math.max(len1, len2) + (config.value.operation === 'Tambah' || config.value.operation === 'Darab' ? 1 : 0);
                });

                const formattedTime = computed(() => {
                    const mins = Math.floor(timerSeconds.value / 60);
                    const secs = timerSeconds.value % 60;
                    return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                });

                const currentAccuracy = computed(() => {
                    if (currentQuestionIndex.value === 0) return 100;
                    return Math.round((score.value / currentQuestionIndex.value) * 100);
                });

                const reportSummary = computed(() => {
                    const targetedList = filteredReportList.value;
                    if (targetedList.length === 0) {
                        return { totalSessions: 0, avgAccuracy: 0, avgTime: '0s' };
                    }
                    const totalSessions = targetedList.length;
                    const sumAccuracy = targetedList.reduce((sum, item) => sum + item.accuracy, 0);
                    const avgAccuracy = Math.round(sumAccuracy / totalSessions);
                    
                    const totalSecs = targetedList.reduce((sum, item) => sum + item.durationSecs, 0);
                    const avgSecs = Math.round(totalSecs / totalSessions);
                    
                    let avgTimeStr = `${avgSecs}s`;
                    if (avgSecs >= 60) {
                        avgTimeStr = `${Math.floor(avgSecs/60)}m ${avgSecs%60}s`;
                    }

                    return { totalSessions, avgAccuracy, avgTime: avgTimeStr };
                });

                const getDigitAt = (number, index) => {
                    const str = String(number);
                    const revIndex = str.length - 1 - index;
                    if (revIndex >= 0 && revIndex < str.length) {
                        return str[revIndex];
                    }
                    return ''; 
                };

                const changeOperation = (op) => {
                    config.value.operation = op;
                    playSound('click');
                };

                const openReports = () => {
                    playSound('click');
                    screen.value = 'reports';
                };

                const clearReports = async () => {
                    const activeUid = parentUser.value || config.value.activeParentId;
                    if (!activeUid || !confirm("Adakah anda pasti mahu memadamkan rekod laporan ini?")) return;
                    playSound('wrong');
                    try {
                        if (user.value) {
                            for (const report of reportList.value) {
                                if (report.studentName === user.value.toLowerCase()) {
                                    await remove(dbRef(fDatabase, `users/${activeUid}/reports/${report.id}`));
                                }
                            }
                        } else {
                            await remove(dbRef(fDatabase, `users/${activeUid}/reports`));
                        }
                    } catch(e) {
                        alert("Gagal memadam rekod: " + e.message);
                    }
                };

                const generateQuestions = () => {
                    questions.value = [];
                    usedQuestionCombos.value.clear();
                    
                    let attempts = 0;
                    while (questions.value.length < config.value.totalQuestions && attempts < 1500) {
                        attempts++;
                        let num1 = 0, num2 = 0;
                        const diff = config.value.difficulty;
                        const op = config.value.operation;

                        if (op === 'Tambah' || op === 'Tolak') {
                            if (diff === 'Mudah') {
                                num1 = Math.floor(Math.random() * 90) + 10; 
                                num2 = Math.floor(Math.random() * 9) + 1;   
                            } else if (diff === 'Sederhana') {
                                num1 = Math.floor(Math.random() * 900) + 100; 
                                num2 = Math.floor(Math.random() * 90) + 10;   
                            } else {
                                num1 = Math.floor(Math.random() * 9000) + 1000; 
                                num2 = Math.floor(Math.random() * 900) + 100;   
                            }
                            if (op === 'Tolak' && num1 < num2) {
                                let temp = num1; num1 = num2; num2 = temp;
                            }
                        } else if (op === 'Darab') {
                            if (diff === 'Mudah') {
                                num1 = Math.floor(Math.random() * 9) + 1; 
                                num2 = Math.floor(Math.random() * 9) + 1; 
                            } else if (diff === 'Sederhana') {
                                num1 = Math.floor(Math.random() * 90) + 10; 
                                num2 = Math.floor(Math.random() * 9) + 1;  
                            } else {
                                num1 = Math.floor(Math.random() * 900) + 100; 
                                num2 = Math.floor(Math.random() * 9) + 1;   
                            }
                        } else if (op === 'Bahagi') {
                            if (diff === 'Mudah') {
                                num2 = Math.floor(Math.random() * 8) + 2; 
                                let quotient = Math.floor(Math.random() * 4) + 11; 
                                num1 = num2 * quotient;
                                if (num1 > 99) {
                                    quotient = Math.floor(99 / num2);
                                    num1 = num2 * quotient;
                                }
                            } else if (diff === 'Sederhana') {
                                num2 = Math.floor(Math.random() * 8) + 2; 
                                num1 = Math.floor(Math.random() * 89) + 10; 
                                if (num1 % num2 === 0) {
                                    num1 = (num1 + 1) > 99 ? num1 - 1 : num1 + 1;
                                }
                            } else {
                                num2 = Math.floor(Math.random() * 8) + 2; 
                                num1 = Math.floor(Math.random() * 899) + 100; 
                                if (num1 % num2 === 0) {
                                    num1 = (num1 + 1) > 999 ? num1 - 1 : num1 + 1;
                                }
                            }
                        }

                        const key = op === 'Tambah' || op === 'Darab' 
                            ? [num1, num2].sort((a,b)=>a-b).join('-')
                            : `${num1}-${num2}`;

                        if (!usedQuestionCombos.value.has(key)) {
                            usedQuestionCombos.value.add(key);
                            questions.value.push({ 
                                num1, 
                                num2, 
                                isCorrect: false, 
                                studentAnsStr: '', 
                                correctAnsStr: '',
                                wasCorrected: false
                            });
                        }
                    }
                };

                const startSession = () => {
                    if (!user.value) user.value = "Utama";
                    playSound('correct');
                    generateQuestions();
                    currentQuestionIndex.value = 0;
                    score.value = 0;
                    correctionIndex.value = null;
                    setupQuestionLayout();
                    screen.value = 'gameplay';
                    startTimer();
                };

                const setupQuestionLayout = () => {
                    const op = config.value.operation;
                    activeTarget.value = { type: 'answer', index: 0 };

                    answerArray.value = Array(maxColumns.value).fill('');
                    carryArray.value = Array(maxColumns.value).fill('');
                    borrowArray.value = Array(maxColumns.value).fill('');

                    if (op === 'Bahagi') {
                        const len = String(currentQuestion.value.num1).length;
                        divisionInputs.value = {
                            quotientArray: Array(len).fill(''),
                            remainderArray: Array(len).fill(''),
                            finalRemainder: ''
                        };
                        activeTarget.value = { type: 'div_quotient_arr', index: 0 };
                    }
                };

                const startCorrection = (index) => {
                    playSound('click');
                    correctionIndex.value = index;
                    screen.value = 'correction';
                    setupQuestionLayout();
                };

                const exitCorrection = () => {
                    playSound('click');
                    correctionIndex.value = null;
                    screen.value = 'results';
                };

                const triggerBorrow = (idx) => {
                    if (config.value.operation !== 'Tolak') return;
                    playSound('click');
                    activeTarget.value = { type: 'borrow', index: idx };
                };

                const pressKey = (key) => {
                    playSound('click');
                    const target = activeTarget.value;
                    const op = config.value.operation;
                    const digitCount = String(currentQuestion.value.num1).length;
                    
                    if (key === 'C') {
                        clearActiveTarget();
                        return;
                    }
                    if (key === 'BACKSPACE') {
                        backspaceActiveTarget();
                        return;
                    }

                    if (target.type === 'answer') {
                        answerArray.value[target.index] = key;
                        if ((op === 'Tambah' || op === 'Darab') && target.index < maxColumns.value - 1) {
                            activeTarget.value = { type: 'carry', index: target.index + 1 };
                        } else if (target.index < maxColumns.value - 1) {
                            activeTarget.value = { type: 'answer', index: target.index + 1 };
                        }
                    } else if (target.type === 'carry') {
                        carryArray.value[target.index] = key;
                        activeTarget.value = { type: 'answer', index: target.index };
                    } else if (target.type === 'borrow') {
                        let currentVal = String(borrowArray.value[target.index] || '');
                        if (currentVal.length < 2) {
                            borrowArray.value[target.index] = currentVal + key;
                        }
                    } 
                    else if (target.type === 'div_quotient_arr') {
                        divisionInputs.value.quotientArray[target.index] = key;
                        if (target.index < digitCount - 1) {
                            activeTarget.value = { type: 'div_remainder_arr', index: target.index };
                        } else {
                            activeTarget.value = { type: 'div_final_remainder', index: 0 };
                        }
                    } else if (target.type === 'div_remainder_arr') {
                        divisionInputs.value.remainderArray[target.index] = key;
                        if (target.index + 1 < digitCount) {
                            activeTarget.value = { type: 'div_quotient_arr', index: target.index + 1 };
                        }
                    } else if (target.type === 'div_final_remainder') {
                        divisionInputs.value.finalRemainder = key;
                    }
                };

                const clearActiveTarget = () => {
                    const target = activeTarget.value;
                    if (target.type === 'answer') answerArray.value[target.index] = '';
                    if (target.type === 'carry') carryArray.value[target.index] = '';
                    if (target.type === 'borrow') borrowArray.value[target.index] = '';
                    if (target.type === 'div_quotient_arr') divisionInputs.value.quotientArray[target.index] = '';
                    if (target.type === 'div_remainder_arr') divisionInputs.value.remainderArray[target.index] = '';
                    if (target.type === 'div_final_remainder') divisionInputs.value.finalRemainder = '';
                };

                const backspaceActiveTarget = () => {
                    const target = activeTarget.value;
                    const op = config.value.operation;

                    if (target.type === 'answer') {
                        answerArray.value[target.index] = '';
                        if (target.index > 0) {
                            if (op === 'Tambah' || op === 'Darab') {
                                activeTarget.value = { type: 'carry', index: target.index };
                            } else {
                                activeTarget.value = { type: 'answer', index: target.index - 1 };
                            }
                        }
                    }
                    if (target.type === 'carry') {
                        carryArray.value[target.index] = '';
                        activeTarget.value = { type: 'answer', index: target.index - 1 };
                    }
                    if (target.type === 'borrow') {
                        let val = String(borrowArray.value[target.index] || '');
                        borrowArray.value[target.index] = val.substring(0, val.length - 1);
                    }
                    if (target.type === 'div_quotient_arr') {
                        divisionInputs.value.quotientArray[target.index] = '';
                        if (target.index > 0) {
                            activeTarget.value = { type: 'div_remainder_arr', index: target.index - 1 };
                        }
                    }
                    if (target.type === 'div_remainder_arr') {
                        divisionInputs.value.remainderArray[target.index] = '';
                        activeTarget.value = { type: 'div_quotient_arr', index: target.index };
                    }
                    if (target.type === 'div_final_remainder') {
                        divisionInputs.value.finalRemainder = '';
                        const len = String(currentQuestion.value.num1).length;
                        activeTarget.value = { type: 'div_quotient_arr', index: len - 1 };
                    }
                };

                const submitAnswer = () => {
                    const op = config.value.operation;
                    const q = currentQuestion.value;
                    let isCorrect = false;
                    let studentAnsStr = '';
                    let correctAnsStr = '';

                    if (op === 'Tambah' || op === 'Tolak' || op === 'Darab') {
                        const submittedString = [...answerArray.value].reverse().join('').trim();
                        const submittedAns = parseInt(submittedString, 10) || 0;
                        studentAnsStr = submittedString || '0';
                        
                        let actualAns = 0;
                        if (op === 'Tambah') actualAns = q.num1 + q.num2;
                        if (op === 'Tolak') actualAns = q.num1 - q.num2;
                        if (op === 'Darab') actualAns = q.num1 * q.num2;
                        correctAnsStr = String(actualAns);

                        if (submittedAns === actualAns) isCorrect = true;
                    } else if (op === 'Bahagi') {
                        const actualQuotient = Math.floor(q.num1 / q.num2);
                        const actualRemainder = q.num1 % q.num2;

                        const submittedQuotientStr = divisionInputs.value.quotientArray.join('').trim();
                        const sQuotient = parseInt(submittedQuotientStr, 10) || 0;
                        const sRemainder = parseInt(divisionInputs.value.finalRemainder, 10) || 0;

                        studentAnsStr = `${sQuotient}${sRemainder > 0 ? ' Baki ' + sRemainder : ''}`;
                        correctAnsStr = `${actualQuotient}${actualRemainder > 0 ? ' Baki ' + actualRemainder : ''}`;

                        if (sQuotient === actualQuotient && sRemainder === actualRemainder) {
                            isCorrect = true;
                        }
                    }

                    if (screen.value === 'correction') {
                        if (isCorrect) {
                            playSound('correct');
                            alert("Syabas! Pembetulan anda betul! 🎉");
                            
                            const idx = correctionIndex.value;
                            questions.value[idx].isCorrect = true;
                            questions.value[idx].studentAnsStr = studentAnsStr;
                            questions.value[idx].wasCorrected = true; 
                            
                            exitCorrection();
                        } else {
                            playSound('wrong');
                            alert("Alamak, jawapan pembetulan masih kurang tepat. Cuba lagi ya! 💪");
                        }
                        return;
                    }

                    questions.value[currentQuestionIndex.value].isCorrect = isCorrect;
                    questions.value[currentQuestionIndex.value].studentAnsStr = studentAnsStr;
                    questions.value[currentQuestionIndex.value].correctAnsStr = correctAnsStr;

                    if (isCorrect) {
                        score.value += 1;
                        playSound('correct');
                    } else {
                        playSound('wrong');
                    }

                    if (currentQuestionIndex.value < config.value.totalQuestions - 1) {
                        currentQuestionIndex.value += 1;
                        setupQuestionLayout();
                    } else {
                        endSession();
                    }
                };

                const startTimer = () => {
                    timerSeconds.value = 0;
                    timerInterval.value = setInterval(() => {
                        timerSeconds.value += 1;
                    }, 1000);
                };

                const stopTimer = () => {
                    if (timerInterval.value) {
                        clearInterval(timerInterval.value);
                        timerInterval.value = null;
                    }
                };

                const endSession = async () => {
                    stopTimer();
                    const mins = Math.floor(timerSeconds.value / 60);
                    const secs = timerSeconds.value % 60;
                    
                    let durationStr = `${secs}s`;
                    if (mins > 0) durationStr = `${mins}m ${secs}s`;
                    finalTimeDisplay.value = mins > 0 ? `${mins} minit ${secs} saat` : `${secs} saat`;

                    const now = new Date();
                    const dateStr = `${now.getDate()}/${now.getMonth()+1} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                    
                    const newRecord = {
                        studentName: user.value.toLowerCase(),
                        operation: config.value.operation,
                        difficulty: config.value.difficulty,
                        score: score.value,
                        total: config.value.totalQuestions,
                        accuracy: Math.round((score.value / config.value.totalQuestions) * 100),
                        durationSecs: timerSeconds.value,
                        durationStr: durationStr,
                        date: dateStr
                    };

                    const activeUid = parentUser.value || config.value.activeParentId;
                    if (activeUid) {
                        try {
                            const reportsRef = dbRef(fDatabase, `users/${activeUid}/reports`);
                            await push(reportsRef, newRecord);
                        } catch (e) {
                            console.log("Database write error:", e);
                        }
                    }

                    screen.value = 'results';
                };

                const retrySession = () => {
                    startSession();
                };

                const goToMenu = () => {
                    playSound('click');
                    if (user.value) {
                        screen.value = 'menu';
                    } else if (parentUser.value) {
                        screen.value = 'parentDashboard';
                    } else {
                        screen.value = 'login-selection';
                    }
                };

                return {
                    user, parentUser, screen, childPinInput, parentEmail, parentPassword, isRegisterMode, authLoading,
                    newChildName, childProfiles, reportList, filteredReportList, config, score, currentQuestionIndex,
                    currentQuestion, maxColumns, answerArray, carryArray, borrowArray, divisionInputs, activeTarget,
                    formattedTime, currentAccuracy, finalTimeDisplay, reportSummary, questions, correctionIndex,
                    handleParentAuth, loginAsChild, addChildProfile, regenerateChildPin, deleteChildProfile, getChildStats,
                    openParentDashboard, logout, getDigitAt, changeOperation, startSession, triggerBorrow, pressKey, 
                    submitAnswer, retrySession, goToMenu, playSound, openReports, clearReports, startCorrection, exitCorrection
                };
            }
        }).mount('#app');
    </script>
